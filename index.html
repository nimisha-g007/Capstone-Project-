<!DOCTYPE html>
<html>
<head>
<title>Lost & Found</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e8f8f3, #d4f1e8);
    margin: 0;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 30px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-left img {
    width: 50px;
    border-radius: 8px;
    cursor: zoom-in;
    transition: 0.3s;
}

.nav-left img:hover {
    transform: scale(1.1);
}

.nav-left span {
    font-weight: bold;
    font-size: 18px;
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #007BFF;
}

/* Title */
.title {
    text-align: center;
    margin-top: 25px;
    font-size: 28px;
}

/* Container */
.container {
    background: white;
    padding: 30px 20px;
    width: 380px;
    margin: 40px auto;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* Inputs */
input, textarea {
    width: 90%;
    padding: 12px;
    margin: 10px auto;
    display: block;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus, textarea:focus {
    border-color: #28a745;
    box-shadow: 0 0 5px rgba(40,167,69,0.5);
}

/* ✅ GREEN SUBMIT BUTTON */
button {
    padding: 12px;
    width: 90%;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    font-size: 15px;
    background: #28a745;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #1e7e34;
}

/* 🔥 LIGHTBOX */
#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

#lightbox.active {
    opacity: 1;
    pointer-events: auto;
}

#lightbox img {
    max-width: 80%;
    max-height: 80%;
    border-radius: 12px;
    transform: scale(0.7);
    transition: 0.3s;
}

#lightbox.active img {
    transform: scale(1);
}

/* Responsive */
@media (max-width: 400px) {
    .container {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <img src="findsquad_logo.svg" id="logo">
        <span>FindSquad</span>
    </div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="posts.html">View Posts</a>
    </div>
</div>

<h1 class="title">LOST & FOUND PORTAL</h1>

<div class="container">
    <input id="name" placeholder="Name">
    <input id="contact" placeholder="10-digit contact">
    <input id="email" placeholder="Email">
    <textarea id="desc" placeholder="Describe item"></textarea>
    <input type="file" id="image">

    <button onclick="createPost()">Submit</button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <img id="lightbox-img">
</div>

<script>
let isSubmitting = false;

function isValidPhone(phone) {
    return /^[0-9]{10}$/.test(phone);
}

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}

/* 🔥 LOGO ZOOM */
const logo = document.getElementById("logo");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

logo.addEventListener("click", () => {
    lightbox.classList.add("active");
    lightboxImg.src = logo.src;
});

lightbox.addEventListener("click", () => {
    lightbox.classList.remove("active");
});

/* FORM */
function createPost() {
    if (isSubmitting) return;

    let name = document.getElementById("name").value;
    let contact = document.getElementById("contact").value;
    let email = document.getElementById("email").value;
    let desc = document.getElementById("desc").value;
    let file = document.getElementById("image").files[0];

    if (!name || !contact || !email || !desc) {
        alert("Fill all fields");
        return;
    }

    if (!isValidPhone(contact) || !isValidEmail(email)) {
        alert("Invalid phone or email");
        return;
    }

    isSubmitting = true;

    let reader = new FileReader();

    reader.onload = function () {
        fetch("http://127.0.0.1:5000/posts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                name,
                contact,
                email,
                description: desc,
                image: file ? reader.result : null
            })
        })
        .then(res => res.json())
        .then(data => {
            alert("Post Added!");
            window.location.href = "posts.html";
        })
        .catch(() => {
            alert("Error adding post");
            isSubmitting = false;
        });
    };

    if (file) reader.readAsDataURL(file);
    else reader.onload();
}
</script>

</body>
</html>
